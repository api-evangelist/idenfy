aid: idenfy
name: iDenfy
description: >-
  iDenfy is an identity verification platform providing KYC and AML compliance
  solutions. The iDenfy API enables businesses to verify identities, check for
  fraud, and comply with regulatory requirements through automated document
  verification, facial recognition, and fraud detection services.
